<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | mini app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}?v=invoice-3">
</head>
<body>
    <div class="shell">
        {% block content %}{% endblock %}
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        window.MINI_APP_DATA = {
            jobs: {{ jobs | tojson }},
            appointments: {{ appointments | tojson }},
            technicians: {{ technicians | tojson }},
            billitBaseUrl: {{ billit_base_url | tojson }}
        };
    </script>
    <script src="{{ url_for('static', path='app.js') }}?v=invoice-3"></script>
</body>
</html>
